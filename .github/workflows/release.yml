name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      republish_existing_release:
        description: Re-push GHCR images for the existing v<VERSION> release without editing the release
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/x-dora/rw-node-go
  NODE_VERSION: "2.7.0"
  PRERELEASE_TAG: pre-release

jobs:
  preflight:
    uses: ./.github/workflows/preflight.yml
    with:
      run_panel_integration: false
    secrets: inherit

  prepare:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      project_version: ${{ steps.version.outputs.project_version }}
      baseline_tag: ${{ steps.plan.outputs.baseline_tag }}
      release_exists: ${{ steps.plan.outputs.release_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read project version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$project_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "VERSION must be a semver value, got: $project_version" >&2
            exit 1
          fi

          echo "project_version=$project_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$project_version" >> "$GITHUB_OUTPUT"

      - name: Plan release mode
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
          REPUBLISH_EXISTING_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.republish_existing_release == true }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          tag_exists=false
          release_exists=false
          version_changed=false

          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null \
            || git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            tag_exists=true
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_exists=true
          fi

          if [[ "${{ github.event_name }}" == "push" \
            && -n "${{ github.event.before }}" \
            && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            previous_version="$(git show "${{ github.event.before }}:VERSION" 2>/dev/null | tr -d '[:space:]' || true)"
            if [[ "$previous_version" != "$PROJECT_VERSION" ]]; then
              version_changed=true
            fi
          fi

          if [[ "$REPUBLISH_EXISTING_RELEASE" == "true" ]]; then
            if [[ "$release_exists" != "true" ]]; then
              echo "republish_existing_release requires an existing GitHub Release: $RELEASE_TAG" >&2
              exit 1
            fi
            mode=republish
          elif [[ "$tag_exists" == "false" && "$release_exists" == "false" ]]; then
            mode=formal
          elif [[ "$version_changed" == "true" ]]; then
            if [[ "$tag_exists" == "true" || "$release_exists" == "true" ]]; then
              echo "VERSION changed to $PROJECT_VERSION, but $RELEASE_TAG already exists; refusing to overwrite it." >&2
              exit 1
            fi
            mode=formal
          else
            mode=prerelease
          fi

          if [[ "$mode" == "prerelease" && "$tag_exists" == "true" ]]; then
            baseline_tag="$RELEASE_TAG"
          else
            baseline_tag="$(git tag --list 'v[0-9]*' --sort=-v:refname | grep -v "^$RELEASE_TAG$" | head -n 1 || true)"
          fi

          {
            echo "mode=$mode"
            echo "baseline_tag=$baseline_tag"
            echo "release_exists=$release_exists"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Release plan"
            echo
            echo "- Mode: \`$mode\`"
            echo "- Project version: \`$PROJECT_VERSION\`"
            echo "- Release tag: \`$RELEASE_TAG\`"
            echo "- Release exists: \`$release_exists\`"
            echo "- Baseline tag: \`${baseline_tag:-none}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
          MODE: ${{ steps.plan.outputs.mode }}
          BASELINE_TAG: ${{ steps.plan.outputs.baseline_tag }}
        shell: bash
        run: |
          set -euo pipefail
          target_tag="$RELEASE_TAG"
          if [[ "$MODE" == "prerelease" ]]; then
            target_tag="$PRERELEASE_TAG"
          fi

          args=(-X POST "repos/${{ github.repository }}/releases/generate-notes" -f "tag_name=$target_tag" -f "target_commitish=${{ github.sha }}")
          if [[ -n "$BASELINE_TAG" ]]; then
            args+=(-f "previous_tag_name=$BASELINE_TAG")
          fi
          gh api "${args[@]}" --jq '.body' > release-notes.generated.md
          sed -i '/^\*\*Full Changelog\*\*:/d' release-notes.generated.md

          if [[ -n "$BASELINE_TAG" ]]; then
            range="$BASELINE_TAG..${{ github.sha }}"
          else
            range="${{ github.sha }}"
          fi

          declare -A titles=(
            [feat]="Features"
            [fix]="Bug Fixes"
            [refactor]="Refactors"
            [perf]="Performance"
            [ci]="CI/CD"
            [chore]="Chores"
            [docs]="Documentation"
            [test]="Tests"
            [style]="Styles"
            [other]="Other Changes"
          )
          order=(feat fix refactor perf ci chore docs test style other)
          conventional_re='^([a-z]+)(\([^)]+\))?!?:[[:space:]]+'
          tmp_dir="$(mktemp -d)"
          while IFS=$'\t' read -r sha subject
          do
            type="other"
            if [[ "$subject" =~ $conventional_re ]]; then
              candidate="${BASH_REMATCH[1]}"
              case "$candidate" in
                feat|fix|refactor|perf|ci|chore|docs|test|style) type="$candidate" ;;
              esac
            fi
            printf -- "- %s ([%s](https://github.com/${{ github.repository }}/commit/%s))\n" "$subject" "${sha:0:7}" "$sha" >> "$tmp_dir/$type.md"
          done < <(git log --reverse --format='%H%x09%s' "$range")

          {
            echo "## Commits"
            echo
            wrote=false
            for type in "${order[@]}"
            do
              file="$tmp_dir/$type.md"
              if [[ -s "$file" ]]; then
                echo "### ${titles[$type]}"
                echo
                cat "$file"
                echo
                wrote=true
              fi
            done
            if [[ "$wrote" == "false" ]]; then
              echo "- No commits found."
              echo
            fi
          } > release-notes.commits.md

          {
            echo "## Build"
            echo
            echo "- Project version: \`$PROJECT_VERSION\`"
            echo "- Panel compatibility version: \`$NODE_VERSION\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo
            echo "## Docker images"
            echo
            if [[ "$MODE" == "formal" || "$MODE" == "republish" ]]; then
              echo "- \`$IMAGE_NAME:latest\`"
              echo "- \`$IMAGE_NAME:$RELEASE_TAG\`"
            else
              echo "- 正式 release 镜像会在 \`VERSION\` 变更并通过门禁后发布。"
            fi
            echo
            echo "## Binary assets"
            echo
            echo "- Linux release packages include \`rw-node-go\`, \`geoip.dat\`, \`geosite.dat\`, \`README.md\`, and \`LICENSE\`."
            echo "- Xray geodata source: \`Loyalsoldier/v2ray-rules-dat\` release branch."
            echo "- Default Xray asset directory: \`/usr/local/share/xray\`."
            echo
            cat release-notes.commits.md
            echo
            cat release-notes.generated.md
            echo
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${BASELINE_TAG:-${{ github.sha }}}...$target_tag"
          } > release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  check-assets:
    needs: prepare
    if: needs.prepare.outputs.mode != 'republish'
    runs-on: ubuntu-latest
    steps:
      - name: Restore Geodat Cache
        uses: actions/cache/restore@v5
        with:
          path: resources
          key: xray-geodat-

      - name: Check Assets Existence
        id: check-assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p resources
          for file_name in geoip.dat geosite.dat
          do
            echo "Checking ${file_name}..."
            if [ -s "./resources/${file_name}" ]; then
              echo "${file_name} exists."
            else
              echo "${file_name} does not exist."
              echo "missing=true" >> "$GITHUB_OUTPUT"
              break
            fi
          done

      - name: Trigger Asset Update Workflow if Assets Missing
        if: steps.check-assets.outputs.missing == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'scheduled-assets-update.yml',
              ref: context.ref
            });
            console.log('Triggered scheduled-assets-update.yml due to missing geodat assets on branch:', context.ref);

      - name: Sleep for 90 seconds if Assets Missing
        if: steps.check-assets.outputs.missing == 'true'
        run: sleep 90

  binaries:
    needs:
      - prepare
      - check-assets
    if: needs.prepare.outputs.mode != 'republish'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: linux-64
          - goos: linux
            goarch: arm64
            asset_name: linux-arm64-v8a
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download modules
        run: go mod download

      - name: Restore Geodat Cache
        uses: actions/cache/restore@v5
        with:
          path: resources
          key: xray-geodat-

      - name: Check geodat
        shell: bash
        run: |
          set -euo pipefail
          test -s resources/geoip.dat
          test -s resources/geosite.dat

      - name: Build release package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build_assets dist
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          COMMIT=${GITHUB_SHA} BUILD_DATE=${build_date} go run ./cmd/rw-build -repo-root . -o build_assets/rw-node-go -goos "$GOOS" -goarch "$GOARCH"
          cp resources/geoip.dat build_assets/geoip.dat
          cp resources/geosite.dat build_assets/geosite.dat
          cp README.md build_assets/README.md
          cp LICENSE build_assets/LICENSE
          pushd build_assets
          touch -mt "$(date +%Y01010000)" *
          tar -czf "../dist/rw-node-go-${{ matrix.asset_name }}.tar.gz" .
          popd
          file="./dist/rw-node-go-${{ matrix.asset_name }}.tar.gz"
          dgst="${file}.dgst"
          for method in md5 sha1 sha256 sha512
          do
            openssl dgst "-${method}" "$file" | sed 's/([^)]*)//g' >> "$dgst"
          done

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.asset_name }}
          path: |
            dist/rw-node-go-${{ matrix.asset_name }}.tar.gz
            dist/rw-node-go-${{ matrix.asset_name }}.tar.gz.dgst

  docker:
    needs: prepare
    if: needs.prepare.outputs.mode == 'formal' || needs.prepare.outputs.mode == 'republish'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Check GHCR package access
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          gh api "/orgs/${{ github.repository_owner }}/packages/container/rw-node-go" >/tmp/ghcr-package.json 2>/tmp/ghcr-package.err
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            echo "::warning title=GHCR package access not visible::GITHUB_TOKEN cannot read existing GHCR package metadata. If Docker push fails with write_package, open the ghcr.io/x-dora/rw-node-go package settings and grant x-dora/rw-node-go repository write or inherited access."
            cat /tmp/ghcr-package.err || true
          else
            echo "GHCR package metadata is visible to this workflow token."
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.release_tag }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Explain GHCR permission failure
        if: failure()
        run: |
          echo "::error title=GHCR write permission required::Docker push failed. If the error contains write_package, keep packages: write in this workflow and grant the x-dora/rw-node-go repository write or inherited access in the ghcr.io/x-dora/rw-node-go package settings."

  publish-release:
    needs:
      - prepare
      - binaries
      - docker
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      (
        (needs.prepare.outputs.mode == 'prerelease' && needs.binaries.result == 'success') ||
        (needs.prepare.outputs.mode == 'formal' && needs.binaries.result == 'success' && needs.docker.result == 'success') ||
        (needs.prepare.outputs.mode == 'republish' && needs.docker.result == 'success')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download release assets
        if: needs.prepare.outputs.mode != 'republish'
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Update rolling pre-release
        if: needs.prepare.outputs.mode == 'prerelease'
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_TAG: ${{ needs.prepare.outputs.baseline_tag }}
        shell: bash
        run: |
          set -euo pipefail
          git tag -f "$PRERELEASE_TAG" "${{ github.sha }}"
          git push origin "refs/tags/$PRERELEASE_TAG" --force

          title="Pre-release after ${BASELINE_TAG:-initial release}"
          if gh release view "$PRERELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$PRERELEASE_TAG" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "$PRERELEASE_TAG" \
              --target "${{ github.sha }}" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
          fi
          gh release upload "$PRERELEASE_TAG" release-assets/* --clobber

      - name: Publish formal release
        if: needs.prepare.outputs.mode == 'formal'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to overwrite it." >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null || git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists; refusing to overwrite an existing release tag." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            --target "${{ github.sha }}" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --latest
          gh release upload "$RELEASE_TAG" release-assets/* --clobber

      - name: Report image republish
        if: needs.prepare.outputs.mode == 'republish'
        run: |
          {
            echo "## Existing release image republished"
            echo
            echo "- Release: \`${{ needs.prepare.outputs.release_tag }}\`"
            echo "- Project version: \`${{ needs.prepare.outputs.project_version }}\`"
            echo "- GitHub Release was left unchanged."
          } >> "$GITHUB_STEP_SUMMARY"
