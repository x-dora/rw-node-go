name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      republish_existing_release:
        description: Re-push GHCR images for the existing v<VERSION> release without editing the release
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/x-dora/rw-node-go
  NODE_VERSION: "2.7.0"
  PRERELEASE_TAG: pre-release

jobs:
  preflight:
    uses: ./.github/workflows/preflight.yml
    with:
      run_panel_integration: false
    secrets: inherit

  prepare:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      project_version: ${{ steps.version.outputs.project_version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      baseline_tag: ${{ steps.plan.outputs.baseline_tag }}
      release_exists: ${{ steps.plan.outputs.release_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read project version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$project_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "VERSION must be a semver value, got: $project_version" >&2
            exit 1
          fi

          major_minor="$(printf '%s\n' "$project_version" | awk -F. '{print $1 "." $2}')"
          echo "project_version=$project_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$project_version" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"

      - name: Plan release mode
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
          REPUBLISH_EXISTING_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.republish_existing_release == true }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          tag_exists=false
          release_exists=false
          version_changed=false

          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null \
            || git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            tag_exists=true
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_exists=true
          fi

          if [[ "${{ github.event_name }}" == "push" \
            && -n "${{ github.event.before }}" \
            && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            previous_version="$(git show "${{ github.event.before }}:VERSION" 2>/dev/null | tr -d '[:space:]' || true)"
            if [[ "$previous_version" != "$PROJECT_VERSION" ]]; then
              version_changed=true
            fi
          fi

          if [[ "$REPUBLISH_EXISTING_RELEASE" == "true" ]]; then
            if [[ "$release_exists" != "true" ]]; then
              echo "republish_existing_release requires an existing GitHub Release: $RELEASE_TAG" >&2
              exit 1
            fi
            mode=republish
          elif [[ "$tag_exists" == "false" && "$release_exists" == "false" ]]; then
            mode=formal
          elif [[ "$version_changed" == "true" ]]; then
            if [[ "$tag_exists" == "true" || "$release_exists" == "true" ]]; then
              echo "VERSION changed to $PROJECT_VERSION, but $RELEASE_TAG already exists; refusing to overwrite it." >&2
              exit 1
            fi
            mode=formal
          else
            mode=prerelease
          fi

          if [[ "$mode" == "prerelease" && "$tag_exists" == "true" ]]; then
            baseline_tag="$RELEASE_TAG"
          else
            baseline_tag="$(git tag --list 'v[0-9]*' --sort=-v:refname | grep -v "^$RELEASE_TAG$" | head -n 1 || true)"
          fi

          {
            echo "mode=$mode"
            echo "baseline_tag=$baseline_tag"
            echo "release_exists=$release_exists"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Release plan"
            echo
            echo "- Mode: \`$mode\`"
            echo "- Project version: \`$PROJECT_VERSION\`"
            echo "- Release tag: \`$RELEASE_TAG\`"
            echo "- Release exists: \`$release_exists\`"
            echo "- Baseline tag: \`${baseline_tag:-none}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
          MODE: ${{ steps.plan.outputs.mode }}
          BASELINE_TAG: ${{ steps.plan.outputs.baseline_tag }}
        shell: bash
        run: |
          set -euo pipefail
          target_tag="$RELEASE_TAG"
          if [[ "$MODE" == "prerelease" ]]; then
            target_tag="$PRERELEASE_TAG"
          fi

          args=(-X POST "repos/${{ github.repository }}/releases/generate-notes" -f "tag_name=$target_tag" -f "target_commitish=${{ github.sha }}")
          if [[ -n "$BASELINE_TAG" ]]; then
            args+=(-f "previous_tag_name=$BASELINE_TAG")
          fi
          gh api "${args[@]}" --jq '.body' > release-notes.generated.md

          {
            echo "## Build"
            echo
            echo "- Project version: \`$PROJECT_VERSION\`"
            echo "- Panel compatibility version: \`$NODE_VERSION\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo
            echo "## Docker images"
            echo
            if [[ "$MODE" == "formal" || "$MODE" == "republish" ]]; then
              echo "- \`$IMAGE_NAME:latest\`"
              echo "- \`$IMAGE_NAME:$PROJECT_VERSION\`"
              echo "- \`$IMAGE_NAME:$RELEASE_TAG\`"
              echo "- \`$IMAGE_NAME:${{ steps.version.outputs.major_minor }}\`"
              echo "- \`$IMAGE_NAME:sha-${GITHUB_SHA::7}\`"
            else
              echo "- 正式 release 镜像会在 \`VERSION\` 变更并通过门禁后发布。"
            fi
            echo
            cat release-notes.generated.md
          } > release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  docker:
    needs: prepare
    if: needs.prepare.outputs.mode == 'formal' || needs.prepare.outputs.mode == 'republish'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Check GHCR package access
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          gh api "/orgs/${{ github.repository_owner }}/packages/container/rw-node-go" >/tmp/ghcr-package.json 2>/tmp/ghcr-package.err
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            echo "::warning title=GHCR package access not visible::GITHUB_TOKEN cannot read existing GHCR package metadata. If Docker push fails with write_package, open the ghcr.io/x-dora/rw-node-go package settings and grant x-dora/rw-node-go repository write or inherited access."
            cat /tmp/ghcr-package.err || true
          else
            echo "GHCR package metadata is visible to this workflow token."
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.project_version }}
            type=raw,value=${{ needs.prepare.outputs.release_tag }}
            type=raw,value=${{ needs.prepare.outputs.major_minor }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PROJECT_VERSION=${{ needs.prepare.outputs.project_version }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Explain GHCR permission failure
        if: failure()
        run: |
          echo "::error title=GHCR write permission required::Docker push failed. If the error contains write_package, keep packages: write in this workflow and grant the x-dora/rw-node-go repository write or inherited access in the ghcr.io/x-dora/rw-node-go package settings."

  publish-release:
    needs:
      - prepare
      - docker
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      (
        needs.prepare.outputs.mode == 'prerelease' ||
        (needs.prepare.outputs.mode == 'formal' && needs.docker.result == 'success') ||
        (needs.prepare.outputs.mode == 'republish' && needs.docker.result == 'success')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Update rolling pre-release
        if: needs.prepare.outputs.mode == 'prerelease'
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_TAG: ${{ needs.prepare.outputs.baseline_tag }}
        shell: bash
        run: |
          set -euo pipefail
          git tag -f "$PRERELEASE_TAG" "${{ github.sha }}"
          git push origin "refs/tags/$PRERELEASE_TAG" --force

          title="Pre-release after ${BASELINE_TAG:-initial release}"
          if gh release view "$PRERELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$PRERELEASE_TAG" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "$PRERELEASE_TAG" \
              --target "${{ github.sha }}" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
          fi

      - name: Publish formal release
        if: needs.prepare.outputs.mode == 'formal'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to overwrite it." >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null || git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists; refusing to overwrite an existing release tag." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            --target "${{ github.sha }}" \
            --title "rw-node-go $RELEASE_TAG" \
            --notes-file release-notes.md \
            --latest

          if gh release view "$PRERELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$PRERELEASE_TAG" --yes --cleanup-tag || true
          elif git ls-remote --exit-code --tags origin "refs/tags/$PRERELEASE_TAG" >/dev/null 2>&1; then
            git push origin ":refs/tags/$PRERELEASE_TAG" || true
          fi

      - name: Report image republish
        if: needs.prepare.outputs.mode == 'republish'
        run: |
          {
            echo "## Existing release image republished"
            echo
            echo "- Release: \`${{ needs.prepare.outputs.release_tag }}\`"
            echo "- Project version: \`${{ needs.prepare.outputs.project_version }}\`"
            echo "- GitHub Release was left unchanged."
          } >> "$GITHUB_STEP_SUMMARY"
