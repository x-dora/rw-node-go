name: Contract Diff

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Official remnawave/node tag to check
        required: true
        default: "2.7.0"

permissions:
  contents: read

jobs:
  contract-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Restore Go cache
        id: go-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('.mise.toml', 'go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Check official contract drift
        env:
          CONTRACT_TAG: ${{ inputs.tag }}
        run: mise run contract-diff

      - name: Save Go cache
        if: steps.go-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('.mise.toml', 'go.sum') }}
