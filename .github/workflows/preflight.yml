name: Preflight

on:
  workflow_dispatch:
    inputs:
      run_panel_integration:
        description: Run real Panel live harness
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  workflow_call:
    inputs:
      run_panel_integration:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Restore Go cache
        id: go-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('.mise.toml', 'go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Format check
        run: |
          mise exec -- go fmt ./...
          git diff --exit-code

      - name: Test
        run: mise run test

      - name: Build
        env:
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
        run: mise run build

      - name: Contract diff
        run: mise run contract-diff

      - name: Save Go cache
        if: steps.go-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('.mise.toml', 'go.sum') }}

      - name: Real Panel live harness
        if: ${{ inputs.run_panel_integration == true || inputs.run_panel_integration == 'true' }}
        env:
          PANEL_BASE_URL: ${{ secrets.PANEL_BASE_URL }}
          PANEL_API_KEY: ${{ secrets.PANEL_API_KEY }}
          PANEL_NODE_ID: ${{ secrets.PANEL_NODE_ID }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          NODE_PORT: ${{ secrets.NODE_PORT }}
          INTERNAL_REST_PORT: ${{ secrets.INTERNAL_REST_PORT }}
          XRAY_ASSET_DIR: ${{ secrets.XRAY_ASSET_DIR }}
          PANEL_SMOKE_PATH: ${{ secrets.PANEL_SMOKE_PATH }}
        run: bash scripts/panel-integration.sh run
