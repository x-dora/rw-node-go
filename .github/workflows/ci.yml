name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Download modules
        run: mise exec -- go mod download

      - name: Test
        run: mise run test

      - name: Build
        run: mise exec -- go build ./cmd/rw-node-go
