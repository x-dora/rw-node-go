name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Download modules
        run: mise exec -- go mod download

      - name: Test
        run: mise run test

      - name: Build
        run: |
          PROJECT_VERSION="$(tr -d '[:space:]' < VERSION)"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          mise exec -- go build \
            -ldflags "-X github.com/x-dora/rw-node-go/internal/version.ProjectVersion=${PROJECT_VERSION} -X github.com/x-dora/rw-node-go/internal/version.NodeVersion=2.7.0 -X github.com/x-dora/rw-node-go/internal/version.Commit=${GITHUB_SHA} -X github.com/x-dora/rw-node-go/internal/version.BuildDate=${BUILD_DATE}" \
            ./cmd/rw-node-go
