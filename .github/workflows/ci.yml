name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Download modules
        run: mise exec -- go mod download

      - name: Test
        run: mise run test

      - name: Build
        env:
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
        run: mise run build
